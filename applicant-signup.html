<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TVET Bursary | Applicant Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area"><div class="logo-icon"><i class="fas fa-graduation-cap"></i></div><div class="logo-text"><h2>TVET<span>Bursary</span></h2><p>Smart Allocation System</p></div></div>
            <div class="user-profile-side"><img src="https://ui-avatars.com/api/?background=1e5a8a&color=fff&name=Signup" alt="Avatar"><div><h4>New User</h4><span>Create account</span></div></div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
                <a href="applicant-signup.html" class="nav-item active"><i class="fas fa-user-plus"></i><span>Applicant Signup</span></a>
                <a href="applicant-login.html" class="nav-item"><i class="fas fa-sign-in-alt"></i><span>Applicant Login</span></a>
                <a href="admin-login.html" class="nav-item"><i class="fas fa-user-shield"></i><span>Admin Login</span></a>
                <a href="status-tracking.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Track Status</span></a>
                <a href="admin-review.html" class="nav-item"><i class="fas fa-check-double"></i><span>Admin Review</span></a>
                <a href="reports.html" class="nav-item"><i class="fas fa-print"></i><span>Reports</span></a>
                <a href="analytics.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Analytics</span></a>
                <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
            </nav>
            <div class="sidebar-footer"><button id="darkModeToggle" class="dark-mode-btn"><i class="fas fa-sun"></i><span>Light Mode</span></button></div>
        </aside>

        <main class="main-content center-page">
            <div class="form-wrapper">
                <div class="form-header">
                    <div class="form-icon"><i class="fas fa-user-plus"></i></div>
                    <h1 class="form-title">Create Account</h1>
                    <p class="form-subtitle">Join the TVET Bursary Management System</p>
                </div>

                <form id="signupForm" class="centered-form">
                    <div class="form-row">
                        <div class="form-group"><label>Full Name *</label><input type="text" id="fullname" required placeholder="Enter your full name"></div>
                        <div class="form-group"><label>National ID *</label><input type="text" id="nationalId" required placeholder="Enter your ID number"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Email Address *</label><input type="email" id="email" required placeholder="your@email.com"></div>
                        <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" required placeholder="07XX XXX XXX"></div>
                    </div>
                    <div class="form-group"><label>Institution *</label><input type="text" id="institution" required placeholder="Your TVET institution"></div>
                    <div class="form-row">
                        <div class="form-group"><label>Password * (min 8 chars)</label><input type="password" id="password" required placeholder="Create a strong password"></div>
                        <div class="form-group"><label>Confirm Password *</label><input type="password" id="confirmPassword" required placeholder="Confirm your password"></div>
                    </div>
                    
                    <div class="captcha-container">
                        <span id="captchaCode" class="captcha-text"></span>
                        <input type="text" id="captchaInput" placeholder="Enter CAPTCHA" required>
                        <button type="button" onclick="refreshCaptcha()" class="btn-outline-sm"><i class="fas fa-sync-alt"></i> Refresh</button>
                    </div>
                    
                    <div class="checkbox-group"><label><input type="checkbox" id="termsCheckbox" required> I agree to the <a href="#">Terms and Conditions</a> and <a href="#">Privacy Policy</a></label></div>
                    
                    <button type="submit" class="btn-primary-large btn-full"><i class="fas fa-user-plus"></i> Create Account</button>
                    <div id="signupMessage"></div>
                </form>
                
                <div class="form-footer"><p>Already have an account? <a href="applicant-login.html">Login here</a></p></div>
            </div>
        </main>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script src="email-service.js"></script>
    <script src="theme.js"></script>
    <script>
        let currentCaptcha = '';
        
        function generateCaptcha() { 
            currentCaptcha = Math.random().toString(36).substring(2, 8).toUpperCase(); 
            document.getElementById('captchaCode').innerText = currentCaptcha; 
        }
        
        function refreshCaptcha() { generateCaptcha(); }
        
        function showMessage(msg, type) { 
            const div = document.getElementById('signupMessage'); 
            div.innerHTML = `<div class="alert-${type}"><i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}</div>`; 
            setTimeout(() => { div.innerHTML = ''; }, 5000); 
        }
        
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const nationalId = document.getElementById('nationalId').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const institution = document.getElementById('institution').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const captchaInput = document.getElementById('captchaInput').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            if(!fullname || !nationalId || !email || !phone || !institution) { 
                showMessage('Please fill all required fields', 'error'); 
                return; 
            }
            if(password !== confirm) { 
                showMessage('Passwords do not match', 'error'); 
                return; 
            }
            if(password.length < 8) { 
                showMessage('Password must be at least 8 characters', 'error'); 
                return; 
            }
            if(!termsChecked) { 
                showMessage('Please accept the Terms and Conditions', 'error'); 
                return; 
            }
            if(captchaInput !== currentCaptcha) { 
                showMessage('Invalid CAPTCHA', 'error'); 
                refreshCaptcha(); 
                return; 
            }
            
            showMessage('Creating account...', 'success');
            
            try {
                // Create Firebase Auth user
                const userCredential = await window.firebaseCreateUser(window.firebaseAuth, email, password);
                const firebaseUser = userCredential.user;
                
                // Send email verification
                await window.firebaseSendEmailVerification(firebaseUser);
                
                // Save user data to Firestore
                const userData = {
                    uid: firebaseUser.uid,
                    fullname: fullname,
                    nationalId: nationalId,
                    email: email,
                    phone: phone,
                    institution: institution,
                    role: 'applicant',
                    emailVerified: false,
                    createdAt: new Date().toISOString(),
                    status: 'active'
                };
                
                await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDb, 'users'), userData);
                
                // Save to localStorage for compatibility
                let applicants = JSON.parse(localStorage.getItem('applicants')) || [];
                applicants.push({ 
                    id: firebaseUser.uid, 
                    fullname, 
                    nationalId, 
                    email, 
                    phone, 
                    institution, 
                    password: btoa(password), 
                    registeredAt: new Date().toISOString() 
                });
                localStorage.setItem('applicants', JSON.stringify(applicants));
                
                // Send welcome email
                if(window.sendWelcomeEmail) {
                    await window.sendWelcomeEmail(email, fullname);
                }
                
                showMessage('Registration successful! Please verify your email. Redirecting to login...', 'success');
                setTimeout(() => { window.location.href = 'applicant-login.html'; }, 3000);
                
            } catch (error) {
                console.error("Signup error:", error);
                if(error.code === 'auth/email-already-in-use') {
                    showMessage('Email already registered. Please login instead.', 'error');
                } else if(error.code === 'auth/weak-password') {
                    showMessage('Password is too weak. Use at least 8 characters.', 'error');
                } else {
                    showMessage('Registration failed: ' + error.message, 'error');
                }
            }
        });
        
        generateCaptcha();
        window.refreshCaptcha = refreshCaptcha;
    </script>
</body>
</html>
