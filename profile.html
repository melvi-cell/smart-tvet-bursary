<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | TVET Bursary</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <script>if(!localStorage.getItem('currentApplicant')) window.location.href = 'index.html';</script>

    <div class="sidebar">
        <div class="logo-area"><h2>TVET<span>Bursary</span></h2><small>Applicant Portal</small></div>
        <div class="user-header"><img src="https://ui-avatars.com/api/?background=1e5a8a&color=fff&name=User" class="user-avatar"><h4 id="userName">Loading...</h4><small id="userEmail">Applicant</small></div>
        <nav class="nav-menu">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="apply.html"><i class="fas fa-file-alt"></i> Apply for Bursary</a>
            <a href="status.html"><i class="fas fa-chart-line"></i> Track Status</a>
            <a href="profile.html" class="active"><i class="fas fa-user"></i> My Profile</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
        <button id="darkModeToggle" class="dark-mode-btn"><i class="fas fa-sun"></i> Light Mode</button>
    </div>

    <main class="main-content">
        <div class="top-bar"><div><h1 class="page-title">My Profile</h1><p class="page-subtitle">View and manage your personal information</p></div></div>

        <div class="form-container" style="max-width: 700px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="https://ui-avatars.com/api/?background=1e5a8a&color=fff&name=User" style="width: 100px; height: 100px; border-radius: 50%;" id="profileAvatar">
                <h3 id="profileName">Loading...</h3>
                <p style="color: var(--accent-orange);">Applicant</p>
            </div>
            <form id="profileForm">
                <div class="form-row"><div class="form-group"><label>Full Name</label><input type="text" id="fullname" readonly style="background: var(--bg-dark);"></div><div class="form-group"><label>National ID</label><input type="text" id="nationalId" readonly style="background: var(--bg-dark);"></div></div>
                <div class="form-row"><div class="form-group"><label>Email</label><input type="email" id="email" readonly style="background: var(--bg-dark);"></div><div class="form-group"><label>Phone</label><input type="tel" id="phone"></div></div>
                <div class="form-row"><div class="form-group"><label>Institution</label><input type="text" id="institution"></div><div class="form-group"><label>Member Since</label><input type="text" id="memberSince" readonly style="background: var(--bg-dark);"></div></div>
                <button type="button" onclick="updateProfile()" class="btn-primary btn-full"><i class="fas fa-save"></i> Update Profile</button>
                <div id="profileMsg"></div>
            </form>

            <hr style="margin: 30px 0; border-color: var(--border-color);">
            <h3>Change Password</h3>
            <div class="form-group"><label>Current Password</label><input type="password" id="currentPass"></div>
            <div class="form-row"><div class="form-group"><label>New Password</label><input type="password" id="newPass"></div><div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmNewPass"></div></div>
            <button type="button" onclick="changePassword()" class="btn-success btn-full"><i class="fas fa-key"></i> Change Password</button>
            <div id="passMsg"></div>
        </div>
    </main>

    <script type="module" src="firebase-config.js"></script>
    <script src="email-service.js"></script>
    <script src="theme.js"></script>
    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentApplicant'));
        document.getElementById('userName').innerText = currentUser.fullname || 'User';
        document.getElementById('userEmail').innerText = currentUser.email || '';
        document.getElementById('profileName').innerText = currentUser.fullname || 'User';
        document.getElementById('fullname').value = currentUser.fullname || '';
        document.getElementById('nationalId').value = currentUser.nationalId || '';
        document.getElementById('email').value = currentUser.email || '';
        document.getElementById('phone').value = currentUser.phone || '';
        document.getElementById('institution').value = currentUser.institution || '';
        document.getElementById('memberSince').value = currentUser.createdAt ? new Date(currentUser.createdAt).toLocaleDateString() : '2025';

        function updateProfile() {
            let phone = document.getElementById('phone').value;
            let institution = document.getElementById('institution').value;
            currentUser.phone = phone;
            currentUser.institution = institution;
            localStorage.setItem('currentApplicant', JSON.stringify(currentUser));
            let applicants = JSON.parse(localStorage.getItem('applicants')) || [];
            let index = applicants.findIndex(a => a.id === currentUser.id);
            if(index !== -1) {
                applicants[index].phone = phone;
                applicants[index].institution = institution;
                localStorage.setItem('applicants', JSON.stringify(applicants));
            }
            document.getElementById('profileMsg').innerHTML = '<div class="alert-success">Profile updated!</div>';
            setTimeout(() => document.getElementById('profileMsg').innerHTML = '', 3000);
        }

        function changePassword() {
            let current = document.getElementById('currentPass').value;
            let newPass = document.getElementById('newPass').value;
            let confirm = document.getElementById('confirmNewPass').value;
            let applicants = JSON.parse(localStorage.getItem('applicants')) || [];
            let user = applicants.find(a => a.id === currentUser.id);
            if(!user || atob(user.password) !== current) { document.getElementById('passMsg').innerHTML = '<div class="alert-error">Current password incorrect</div>'; return; }
            if(newPass !== confirm) { document.getElementById('passMsg').innerHTML = '<div class="alert-error">Passwords do not match</div>'; return; }
            if(newPass.length < 8) { document.getElementById('passMsg').innerHTML = '<div class="alert-error">Password must be at least 8 characters</div>'; return; }
            user.password = btoa(newPass);
            localStorage.setItem('applicants', JSON.stringify(applicants));
            document.getElementById('passMsg').innerHTML = '<div class="alert-success">Password changed!</div>';
            document.getElementById('currentPass').value = '';
            document.getElementById('newPass').value = '';
            document.getElementById('confirmNewPass').value = '';
            setTimeout(() => document.getElementById('passMsg').innerHTML = '', 3000);
        }

        function logout() { localStorage.removeItem('currentApplicant'); window.location.href = 'index.html'; }
        window.updateProfile = updateProfile;
        window.changePassword = changePassword;
        window.logout = logout;
    </script>
</body>
</html>
