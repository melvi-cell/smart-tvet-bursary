<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TVET Bursary System | Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <!-- Mobile Menu Toggle -->
    <div class="mobile-menu-toggle" id="mobileMenuToggle">
        <i class="fas fa-bars"></i>
    </div>
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <div class="center-page">
        <div class="form-wrapper">
            <div class="form-header">
                <div class="form-icon"><i class="fas fa-graduation-cap"></i></div>
                <h1 class="form-title">TVET Bursary System</h1>
                <p class="form-subtitle">Student Financial Aid Portal</p>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div id="loginTab" class="tab-pane active">
                <form id="loginForm" class="form-container">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email or National ID</label>
                        <input type="text" id="loginId" required placeholder="Enter your email or ID">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="loginPassword" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn-gradient btn-full"><i class="fas fa-sign-in-alt"></i> Login</button>
                    <div id="loginMessage"></div>
                </form>
                <div class="form-footer"><a href="#" onclick="resetPassword()">Forgot Password?</a></div>
            </div>

            <!-- Signup Form -->
            <div id="signupTab" class="tab-pane">
                <form id="signupForm" class="form-container">
                    <div class="form-row">
                        <div class="form-group"><label>Full Name *</label><input type="text" id="fullname" required placeholder="John Doe"></div>
                        <div class="form-group"><label>National ID *</label><input type="text" id="nationalId" required placeholder="12345678"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Email *</label><input type="email" id="email" required placeholder="student@example.com"></div>
                        <div class="form-group"><label>Phone *</label><input type="tel" id="phone" required placeholder="0712345678"></div>
                    </div>
                    <div class="form-group"><label>Institution *</label><input type="text" id="institution" required placeholder="Your TVET Institution"></div>
                    <div class="form-row">
                        <div class="form-group"><label>Password *</label><input type="password" id="password" required placeholder="Min 8 characters"></div>
                        <div class="form-group"><label>Confirm Password *</label><input type="password" id="confirmPassword" required placeholder="Confirm password"></div>
                    </div>
                    <div class="captcha-container">
                        <span id="captchaCode" class="captcha-text"></span>
                        <input type="text" id="captchaInput" placeholder="Enter CAPTCHA" required>
                        <button type="button" onclick="refreshCaptcha()" class="btn-outline">⟳</button>
                    </div>
                    <div class="checkbox-group"><label><input type="checkbox" id="termsCheckbox" required> I agree to Terms & Conditions</label></div>
                    <button type="submit" class="btn-primary btn-full"><i class="fas fa-user-plus"></i> Create Account</button>
                    <div id="signupMessage"></div>
                </form>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, sendEmailVerification, signOut } from "firebase/auth";
        import { getFirestore, collection, addDoc, getDocs, query, where, doc, setDoc, getDoc } from "firebase/firestore";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDBlls3pKTeHaRYuLSXAo4Xs8w-2IiRBEY",
            authDomain: "tvet-bursary-system.firebaseapp.com",
            projectId: "tvet-bursary-system",
            storageBucket: "tvet-bursary-system.firebasestorage.app",
            messagingSenderId: "711106582989",
            appId: "1:711106582989:web:1b4b484cc2636797c88c84"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        console.log("🔥 Firebase initialized!");
        
        // Mobile Menu
        const mobileToggle = document.getElementById('mobileMenuToggle');
        const mobileOverlay = document.getElementById('mobileOverlay');
        if(mobileToggle) {
            mobileToggle.addEventListener('click', () => {
                document.querySelector('.sidebar')?.classList.toggle('active');
                mobileOverlay?.classList.toggle('active');
            });
        }
        if(mobileOverlay) {
            mobileOverlay.addEventListener('click', () => {
                document.querySelector('.sidebar')?.classList.remove('active');
                mobileOverlay.classList.remove('active');
            });
        }
        
        // Tab Switching
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            if(tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('signupTab').classList.add('active');
                generateCaptcha();
            }
        };
        
        // CAPTCHA
        let currentCaptcha = '';
        function generateCaptcha() { 
            currentCaptcha = Math.random().toString(36).substring(2, 8).toUpperCase(); 
            const captchaEl = document.getElementById('captchaCode');
            if(captchaEl) captchaEl.innerText = currentCaptcha;
        }
        window.refreshCaptcha = function() { generateCaptcha(); };
        
        function showMessage(msg, type, elementId) { 
            const el = document.getElementById(elementId);
            if(el) {
                el.innerHTML = `<div style="padding:12px; border-radius:10px; margin-top:15px; background:${type === 'success' ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)'}; color:${type === 'success' ? '#10b981' : '#ef4444'};">${msg}</div>`;
                setTimeout(() => { if(el) el.innerHTML = ''; }, 5000);
            }
        }
        
        // Password Reset
        window.resetPassword = async function() {
            const email = prompt("Enter your email address to reset password:");
            if(email && email.includes('@')) {
                try {
                    await sendPasswordResetEmail(auth, email);
                    alert("✅ Password reset email sent! Check your inbox.");
                } catch(error) {
                    alert("❌ Error: " + error.message);
                }
            }
        };
        
        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const loginId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPassword').value;
            const isEmail = loginId.includes('@');
            
            try {
                let userData = null;
                let uid = null;
                
                if(isEmail) {
                    const userCredential = await signInWithEmailAndPassword(auth, loginId, password);
                    uid = userCredential.user.uid;
                    
                    // Get from Firestore
                    const userDoc = await getDoc(doc(db, 'users', uid));
                    if(userDoc.exists()) {
                        userData = userDoc.data();
                        userData.uid = uid;
                    }
                } else {
                    // Check local storage as fallback
                    let applicants = JSON.parse(localStorage.getItem('applicants')) || [];
                    userData = applicants.find(a => a.nationalId === loginId && atob(a.password) === password);
                    if(userData) {
                        // Sync to Firestore if exists
                        const q = query(collection(db, 'users'), where('nationalId', '==', loginId));
                        const snapshot = await getDocs(q);
                        if(!snapshot.empty) {
                            uid = snapshot.docs[0].id;
                            userData.uid = uid;
                        }
                    }
                }
                
                if(userData) {
                    localStorage.setItem('currentApplicant', JSON.stringify({...userData, loggedInAt: new Date().toISOString()}));
                    showMessage('✅ Login successful! Redirecting...', 'success', 'loginMessage');
                    
                    // Add notification
                    addNotification(userData.email || userData.uid, 'login', 'You have successfully logged in');
                    
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                } else {
                    throw new Error('Invalid credentials');
                }
            } catch (error) {
                console.error("Login error:", error);
                showMessage(`❌ ${error.message}`, 'error', 'loginMessage');
            }
        });
        
        // SIGNUP
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value.trim();
            const nationalId = document.getElementById('nationalId').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const institution = document.getElementById('institution').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const captchaInput = document.getElementById('captchaInput').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            if(!fullname || !nationalId || !email || !phone || !institution) { 
                showMessage('Please fill all fields', 'error', 'signupMessage'); 
                return; 
            }
            if(password !== confirm) { 
                showMessage('Passwords do not match', 'error', 'signupMessage'); 
                return; 
            }
            if(password.length < 8) { 
                showMessage('Password must be at least 8 characters', 'error', 'signupMessage'); 
                return; 
            }
            if(!termsChecked) { 
                showMessage('Please accept Terms', 'error', 'signupMessage'); 
                return; 
            }
            if(captchaInput !== currentCaptcha) { 
                showMessage('Invalid CAPTCHA', 'error', 'signupMessage'); 
                generateCaptcha(); 
                return; 
            }
            
            showMessage('Creating account...', 'success', 'signupMessage');
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await sendEmailVerification(userCredential.user);
                
                const userData = { 
                    uid: userCredential.user.uid,
                    fullname, 
                    nationalId, 
                    email, 
                    phone, 
                    institution, 
                    role: 'applicant', 
                    createdAt: new Date().toISOString(),
                    profileComplete: false
                };
                
                await setDoc(doc(db, 'users', userCredential.user.uid), userData);
                
                // Save to localStorage
                let applicants = JSON.parse(localStorage.getItem('applicants')) || [];
                applicants.push({ 
                    id: userCredential.user.uid, 
                    fullname, 
                    nationalId, 
                    email, 
                    phone, 
                    institution, 
                    password: btoa(password) 
                });
                localStorage.setItem('applicants', JSON.stringify(applicants));
                
                // Welcome notification
                addNotification(email, 'welcome', `Welcome ${fullname} to TVET Bursary System!`);
                
                if(window.sendWelcomeEmail) {
                    await window.sendWelcomeEmail(email, fullname);
                }
                
                showMessage('✅ Registration successful! Redirecting to login...', 'success', 'signupMessage');
                setTimeout(() => { 
                    window.switchTab('login');
                    document.getElementById('loginId').value = email;
                }, 2000);
            } catch (error) {
                console.error("Signup error:", error);
                if(error.code === 'auth/email-already-in-use') showMessage('Email already registered', 'error', 'signupMessage');
                else if(error.code === 'auth/weak-password') showMessage('Password too weak', 'error', 'signupMessage');
                else showMessage('Registration failed: ' + error.message, 'error', 'signupMessage');
            }
        });
        
        // Notification system
        window.addNotification = function(userId, type, message) {
            let notifications = JSON.parse(localStorage.getItem('notifications')) || [];
            notifications.unshift({
                id: Date.now(),
                userId: userId,
                type: type,
                message: message,
                read: false,
                createdAt: new Date().toISOString()
            });
            // Keep only last 50
            if(notifications.length > 50) notifications = notifications.slice(0, 50);
            localStorage.setItem('notifications', JSON.stringify(notifications));
            
            // Show toast if on page
            if(typeof showToast === 'function') {
                showToast(message, type);
            }
        };
        
        generateCaptcha();
    </script>
    
    <script src="email-service.js"></script>
    <script src="theme.js"></script>
    <script src="mobile.js"></script>
</body>
</html>
