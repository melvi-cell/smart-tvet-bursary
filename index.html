<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicant Portal | TVET Bursary</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="center-page">
        <div class="form-wrapper">
            <div class="form-header">
                <div class="form-icon"><i class="fas fa-graduation-cap"></i></div>
                <h1 class="form-title">TVET Bursary System</h1>
                <p class="form-subtitle">Applicant Portal</p>
            </div>

            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div id="loginTab" class="tab-pane active">
                <form id="loginForm" class="form-container">
                    <div class="form-group"><label>Email or National ID</label><input type="text" id="loginId" required placeholder="Enter your email or ID"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="loginPassword" required placeholder="Enter your password"></div>
                    <button type="submit" class="btn-gradient btn-full"><i class="fas fa-sign-in-alt"></i> Login</button>
                    <div id="loginMessage"></div>
                </form>
                <div class="form-footer" style="text-align:center; margin-top:20px;"><a href="#" onclick="resetPassword()">Forgot Password?</a></div>
            </div>

            <!-- Signup Form -->
            <div id="signupTab" class="tab-pane">
                <form id="signupForm" class="form-container">
                    <div class="form-row">
                        <div class="form-group"><label>Full Name *</label><input type="text" id="fullname" required></div>
                        <div class="form-group"><label>National ID *</label><input type="text" id="nationalId" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                        <div class="form-group"><label>Phone *</label><input type="tel" id="phone" required></div>
                    </div>
                    <div class="form-group"><label>Institution *</label><input type="text" id="institution" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>Password * (min 8 chars)</label><input type="password" id="password" required></div>
                        <div class="form-group"><label>Confirm Password *</label><input type="password" id="confirmPassword" required></div>
                    </div>
                    <div class="captcha-container">
                        <span id="captchaCode" class="captcha-text"></span>
                        <input type="text" id="captchaInput" placeholder="Enter CAPTCHA" required>
                        <button type="button" onclick="refreshCaptcha()" class="btn-outline">Refresh</button>
                    </div>
                    <div class="checkbox-group"><label><input type="checkbox" id="termsCheckbox" required> I agree to Terms & Conditions</label></div>
                    <button type="submit" class="btn-primary btn-full"><i class="fas fa-user-plus"></i> Create Account</button>
                    <div id="signupMessage"></div>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, sendEmailVerification } from "firebase/auth";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "firebase/firestore";
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDBlls3pKTeHaRYuLSXAo4Xs8w-2IiRBEY",
            authDomain: "tvet-bursary-system.firebaseapp.com",
            projectId: "tvet-bursary-system",
            storageBucket: "tvet-bursary-system.firebasestorage.app",
            messagingSenderId: "711106582989",
            appId: "1:711106582989:web:1b4b484cc2636797c88c84"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        console.log("🔥 Firebase initialized!");
        console.log("✅ Auth ready:", !!auth);
        
        // Tab Switching
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            if(tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('loginTab').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('signupTab').classList.add('active');
                generateCaptcha();
            }
        };
        
        // CAPTCHA
        let currentCaptcha = '';
        function generateCaptcha() { currentCaptcha = Math.random().toString(36).substring(2, 8).toUpperCase(); document.getElementById('captchaCode').innerText = currentCaptcha; }
        window.refreshCaptcha = function() { generateCaptcha(); };
        function showMessage(msg, type, elementId) { 
            const el = document.getElementById(elementId);
            if(el) {
                el.innerHTML = `<div style="padding:12px; border-radius:10px; margin-top:15px; background:${type === 'success' ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)'}; color:${type === 'success' ? '#10b981' : '#ef4444'};">${msg}</div>`;
                setTimeout(() => { el.innerHTML = ''; }, 5000);
            }
        }
        
        // Password Reset
        window.resetPassword = async function() {
            const email = prompt("Enter your email address to reset password:");
            if(email && email.includes('@')) {
                try {
                    await sendPasswordResetEmail(auth, email);
                    alert("Password reset email sent! Check your inbox.");
                } catch(error) {
                    console.error("Reset error:", error);
                    alert("Error: " + error.message);
                }
            }
        };
        
        // LOGIN
        let loginAttempts = 3;
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            let loginId = document.getElementById('loginId').value.trim();
            let password = document.getElementById('loginPassword').value;
            const isEmail = loginId.includes('@');
            
            try {
                let userData = null;
                if(isEmail) {
                    // Firebase login
                    const userCredential = await signInWithEmailAndPassword(auth, loginId, password);
                    const usersRef = collection(db, 'users');
                    const q = query(usersRef, where('uid', '==', userCredential.user.uid));
                    const snapshot = await getDocs(q);
                    if(!snapshot.empty) {
                        userData = snapshot.docs[0].data();
                    }
                } else {
                    // Local storage login
                    let applicants = JSON.parse(localStorage.getItem('applicants')) || [];
                    userData = applicants.find(a => a.nationalId === loginId && atob(a.password) === password);
                }
                
                if(userData) {
                    localStorage.setItem('currentApplicant', JSON.stringify(userData));
                    showMessage('Login successful! Redirecting...', 'success', 'loginMessage');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                } else {
                    throw new Error('Invalid credentials');
                }
            } catch (error) {
                console.error("Login error:", error);
                loginAttempts--;
                if(loginAttempts <= 0) { 
                    document.getElementById('loginForm').querySelector('button').disabled = true;
                    showMessage('Too many failed attempts. Account locked.', 'error', 'loginMessage');
                } else {
                    showMessage(`Invalid credentials. ${loginAttempts} attempts left.`, 'error', 'loginMessage');
                }
            }
        });
        
        // SIGNUP
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value.trim();
            const nationalId = document.getElementById('nationalId').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const institution = document.getElementById('institution').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const captchaInput = document.getElementById('captchaInput').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            if(!fullname || !nationalId || !email || !phone || !institution) { showMessage('Please fill all fields', 'error', 'signupMessage'); return; }
            if(password !== confirm) { showMessage('Passwords do not match', 'error', 'signupMessage'); return; }
            if(password.length < 8) { showMessage('Password must be at least 8 characters', 'error', 'signupMessage'); return; }
            if(!termsChecked) { showMessage('Please accept Terms', 'error', 'signupMessage'); return; }
            if(captchaInput !== currentCaptcha) { showMessage('Invalid CAPTCHA', 'error', 'signupMessage'); generateCaptcha(); return; }
            
            showMessage('Creating account...', 'success', 'signupMessage');
            try {
                // Create Firebase user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                await sendEmailVerification(userCredential.user);
                
                // Save to Firestore
                const userData = { 
                    uid: userCredential.user.uid, 
                    fullname, 
                    nationalId, 
                    email, 
                    phone, 
                    institution, 
                    role: 'applicant', 
                    createdAt: new Date().toISOString() 
                };
                await addDoc(collection(db, 'users'), userData);
                
                // Save to localStorage
                let applicants = JSON.parse(localStorage.getItem('applicants')) || [];
                applicants.push({ 
                    id: userCredential.user.uid, 
                    fullname, 
                    nationalId, 
                    email, 
                    phone, 
                    institution, 
                    password: btoa(password) 
                });
                localStorage.setItem('applicants', JSON.stringify(applicants));
                
                // Send welcome email
                if(window.sendWelcomeEmail) {
                    await window.sendWelcomeEmail(email, fullname);
                }
                
                showMessage('Registration successful! Redirecting to login...', 'success', 'signupMessage');
                setTimeout(() => { 
                    window.switchTab('login');
                    document.getElementById('loginId').value = email;
                }, 2000);
            } catch (error) {
                console.error("Signup error:", error);
                if(error.code === 'auth/email-already-in-use') showMessage('Email already registered', 'error', 'signupMessage');
                else if(error.code === 'auth/weak-password') showMessage('Password too weak', 'error', 'signupMessage');
                else showMessage('Registration failed: ' + error.message, 'error', 'signupMessage');
            }
        });
        // Add this inside the existing script tag
function updateSidebarAvatar() {
    let savedPhoto = localStorage.getItem('userProfilePhoto');
    let sidebarAvatar = document.getElementById('sidebarAvatar');
    let currentUser = JSON.parse(localStorage.getItem('currentApplicant'));
    
    if(savedPhoto && sidebarAvatar) {
        sidebarAvatar.src = savedPhoto;
    } else if(sidebarAvatar && currentUser) {
        sidebarAvatar.src = `https://ui-avatars.com/api/?background=1e5a8a&color=fff&name=${encodeURIComponent(currentUser.fullname || 'User')}`;
    }
}

// Call this function after loading currentUser
updateSidebarAvatar();
        
        // Initialize CAPTCHA
        generateCaptcha();
    </script>
    
    <script src="email-service.js"></script>
    <script src="theme.js"></script>
</body>
</html>
